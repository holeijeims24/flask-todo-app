<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мої завдання</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script>
    function toggleTheme() {
        document.body.classList.toggle("light-theme");

        if (document.body.classList.contains("light-theme")) {
            localStorage.setItem("theme", "light");
        } else {
            localStorage.setItem("theme", "dark");
        }
    }

window.onload = function () {
    let theme = localStorage.getItem("theme");

    if (theme === "light") {
        document.body.classList.add("light-theme");
    }
}
</script>
</head>
<body>
    <h1>Мої завдання</h1>
    <button onclick="toggleTheme()">
        🌙/☀️ Змінити тему
    </button>

    <p>📋 Всього: {{ total }}</p>
    <p>✅ Виконано: {{ done_count }}</p>
    <p>⏳ Залишилось: {{ left_count }}</p>

    <p>Користувач: {{ login }}</p>
    <a href="/logout">
        <button>Вийти</button>
    </a>

    <form action="/add_task" method="POST">
        <input type="text" name="task" placeholder="Нове завдання">
        <button type="submit" class="add-btn">Додати</button>
    </form>
    <form action="/tasks" method="GET">
        <input type="text" name="search" placeholder="Пошук">
        <button type="submit">Знайти</button>
    </form>

    <a href="/tasks">Всі</a>
    <a href="/tasks?filter=active">Невиконані</a>
    <a href="/tasks?filter=done">Виконані</a>
    
    <hr>

    {% for id, task, done, created_at in tasks %}
    <div class="task-card">

        {% if done == 1 %}
            ✅
        {% else %}
            ⬜
        {% endif %}

        {{ loop.index }}. {{ task }}

        <br>
        <small>{{ created_at }}</small>

        <div class="task-buttons">

            <a href="/edit_task/{{ id }}">
                <button>Редагувати</button>
            </a>

            <a href="/done_task/{{ id }}">
                <button>Виконано</button>
            </a>

            <a href="/delete_task/{{ id }}"
               onclick="return confirm('Точно видалити це завдання?')">
                <button>Видалити</button>
            </a>

        </div>

    </div>
    {% endfor %}
</body>
</html>
